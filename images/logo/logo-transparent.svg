<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 180" width="520" height="180">
  <!-- Rolled rug mark -->
  <g transform="translate(90, 90)">
    <ellipse cx="0" cy="0" rx="44" ry="44" fill="none" stroke="#c9a24a" stroke-width="3"/>
    <ellipse cx="0" cy="0" rx="32" ry="32" fill="none" stroke="#f5efe3" stroke-width="2"/>
    <ellipse cx="0" cy="0" rx="20" ry="20" fill="none" stroke="#c9a24a" stroke-width="2"/>
    <ellipse cx="0" cy="0" rx="8" ry="8" fill="#c9a24a"/>
    <line x1="-20" y1="-44" x2="-20" y2="-56" stroke="#c9a24a" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-10" y1="-44" x2="-10" y2="-58" stroke="#c9a24a" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="0" y1="-44" x2="0" y2="-60" stroke="#c9a24a" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="10" y1="-44" x2="10" y2="-58" stroke="#c9a24a" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="20" y1="-44" x2="20" y2="-56" stroke="#c9a24a" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Wordmark -->
  <text x="200" y="85" font-family="Georgia, 'Times New Roman', serif" font-size="38" fill="#f5efe3" letter-spacing="1">Rugstore</text>
  <text x="200" y="118" font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="11" fill="#c9a24a" letter-spacing="6">HOME OF FINE RUGS</text>
